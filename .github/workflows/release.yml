name: Release

# One-button release. Actions tab → "Release" → Run workflow → pick patch / minor / major.
# It runs tests, bumps the version, pushes the version commit + tag, then publishes to npm.
#
# npm auth uses OIDC Trusted Publishing (no NPM_TOKEN secret). One-time setup on npmjs.com:
#   package → Settings → Trusted Publisher → GitHub Actions →
#     owner: rizias   repo: delegator   workflow: release.yml
# Alternative (token instead of OIDC): drop `id-token: write`, add a repo secret NPM_TOKEN,
# and set `env: { NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }} }` on the `npm publish` step.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver bump
        type: choice
        options: [patch, minor, major]
        default: patch

permissions:
  contents: write   # push the version commit + tag back to main
  id-token: write   # OIDC Trusted Publishing to npm

# Serialize releases: two manual runs from the same HEAD would otherwise both bump to the
# same next semver and race on publish/push. A second release waits for the first.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - run: npm ci
      - run: npm test                     # fail before bumping if anything is red
      - run: npm install -g npm@latest     # npm >= 11.5, required for OIDC trusted publishing
      - name: Commit identity
        run: |
          git config user.name "rizias"
          git config user.email "42223893+rizias@users.noreply.github.com"
      - run: npm version ${{ inputs.bump }}   # bumps package.json + lock; the `version` npm hook also
                                              # promotes CHANGELOG [Unreleased] -> the new version + date
                                              # and git-adds it; then commits all of it and tags vX.Y.Z
      # Push the version commit + tag BEFORE publishing. If publish later fails, the tag is
      # already in the repo and you can just re-run publish — recoverable. The other direction
      # (publish succeeds, push fails) leaves npm with a version that has no matching tag, which
      # is irreversible on the npm side, so push-first is the safer order.
      - run: git push --follow-tags
      - run: npm publish                       # OIDC; prepublishOnly reruns the tests

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:  # allow manual "Run workflow" from the Actions tab (no push/PR needed)

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      # Run EVERY OS/node cell to completion — don't cancel siblings on the first failure. A
      # platform-specific flake then surfaces the full picture in one run instead of one-per-push.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

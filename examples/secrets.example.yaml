# secrets.yaml - EXAMPLE. The real file lives at ~/.delegator/secrets.yaml.
# Agents/LLMs must NEVER read the real secrets file.
# Keys are mapped by provider id from providers.yaml.

# --- one key per provider (the common case) ---
openai: "sk-xxxxxxxxxxxxxxxxxxxxxxxx"

# --- key POOL: runs rotate round-robin through the list ---
# ANY provider's entry may be a pool.
# openai:
#   - "sk-xxxxxxxxxxxxxxxxxxxxxxxx-1"
#   - "sk-xxxxxxxxxxxxxxxxxxxxxxxx-2"
